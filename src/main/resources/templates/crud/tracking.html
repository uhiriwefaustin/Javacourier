<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Manage Tracking')}"></head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>
<main class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-primary-custom"><i class="fa-solid fa-location-crosshairs me-2"></i> Manage Tracking</h2>
        <button class="btn btn-accent px-4 fw-bold" data-bs-toggle="modal" data-bs-target="#trackingModal">
            <i class="fa-solid fa-plus me-1"></i> New Tracking Entry
        </button>
    </div>
    <div class="card card-custom border-0 p-3">
        <div class="table-responsive">
            <table class="table table-hover align-middle" id="trackingTable">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Package ID</th>
                        <th>Location</th>
                        <th>Status</th>
                        <th>Time</th>
                        <th class="text-end">Actions</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="trackingModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content border-0 card-custom">
                <div class="modal-header bg-primary-custom">
                    <h5 class="modal-title">Tracking Details</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="trackingForm">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Package ID</label>
                            <input type="number" class="form-control" id="packageId" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Current Location</label>
                            <input type="text" class="form-control" id="currentLocation" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">Status Update</label>
                            <input type="text" class="form-control" id="statusUpdate" required placeholder="e.g. Arrived at Station X">
                        </div>
                        <div class="text-end">
                            <button type="button" class="btn btn-outline-secondary me-2" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-accent px-4">Save</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const tableBody = document.querySelector("#trackingTable tbody");
        const form = document.getElementById("trackingForm");
        const modal = new bootstrap.Modal(document.getElementById('trackingModal'));

        function load() {
            fetch("/api/tracking").then(res => res.json()).then(data => {
                tableBody.innerHTML = "";
                data.forEach(t => {
                    const tr = document.createElement("tr");
                    tr.innerHTML = `
                        <td>${t.trackingId}</td>
                        <td>${t.pkg ? t.pkg.packageId : 'N/A'}</td>
                        <td>${t.currentLocation}</td>
                        <td class="fw-bold">${t.statusUpdate}</td>
                        <td class="small">${new Date(t.timestamp).toLocaleString()}</td>
                        <td class="text-end">
                            <button class="btn btn-sm btn-danger px-3 delete-btn" data-id="${t.trackingId}">Delete</button>
                        </td>
                    `;
                    tableBody.appendChild(tr);
                });
                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        if(confirm("Delete this entry?")) {
                            fetch("/api/tracking/" + e.target.dataset.id, {method:'DELETE'}).then(() => load());
                        }
                    });
                });
            });
        }
        form.addEventListener("submit", (e) => {
            e.preventDefault();
            const data = { 
                pkg: { packageId: form.packageId.value },
                currentLocation: form.currentLocation.value,
                statusUpdate: form.statusUpdate.value
            };
            fetch("/api/tracking", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(data)
            }).then(() => { form.reset(); modal.hide(); load(); });
        });
        load();
    });
</script>
</body>
</html>

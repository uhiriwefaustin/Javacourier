<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Manage Users')}"></head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-primary-custom"><i class="fa-solid fa-users me-2"></i> Manage Users</h2>
        <button class="btn btn-accent px-4 fw-bold" data-bs-toggle="modal" data-bs-target="#userModal">
            <i class="fa-solid fa-plus me-1"></i> New User
        </button>
    </div>

    <div class="card card-custom border-0 p-3">
        <div class="table-responsive">
            <table class="table table-hover align-middle" id="usersTable">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Role</th>
                        <th class="text-end">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Populated via JS -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Create/Edit Modal -->
    <div class="modal fade" id="userModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content border-0 card-custom">
                <div class="modal-header bg-primary-custom">
                    <h5 class="modal-title" id="modalTitle">Create User</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="userForm">
                        <div class="mb-3">
                            <label for="username" class="form-label text-muted fw-bold">Username</label>
                            <input type="text" class="form-control" id="username" required>
                        </div>
                        <div class="mb-3">
                            <label for="passwordHash" class="form-label text-muted fw-bold">Password</label>
                            <input type="password" class="form-control" id="passwordHash" required>
                        </div>
                        <div class="mb-4">
                            <label for="role" class="form-label text-muted fw-bold">Role</label>
                            <select class="form-select" id="role" required>
                                <option value="ADMIN">ADMIN</option>
                                <option value="MANAGER">MANAGER</option>
                                <option value="CLERK">CLERK</option>
                                <option value="DRIVER">DRIVER</option>
                                <option value="AUDITOR">AUDITOR</option>
                            </select>
                        </div>
                        <div class="text-end">
                            <button type="button" class="btn btn-outline-secondary me-2" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-accent px-4">Save</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const tableBody = document.querySelector("#usersTable tbody");
        const form = document.getElementById("userForm");
        const modal = new bootstrap.Modal(document.getElementById('userModal'));

        function loadUsers() {
            fetch("/api/users")
                .then(res => res.json())
                .then(data => {
                    tableBody.innerHTML = "";
                    data.forEach(u => {
                        const tr = document.createElement("tr");
                        tr.innerHTML = `
                            <td>${u.userId}</td>
                            <td class="fw-bold">${u.username}</td>
                            <td><span class="badge bg-secondary">${u.role}</span></td>
                            <td class="text-end">
                                <button class="btn btn-sm btn-danger px-3 delete-btn" data-id="${u.userId}">Delete</button>
                            </td>
                        `;
                        tableBody.appendChild(tr);
                    });
                    
                    document.querySelectorAll('.delete-btn').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            if(confirm("Delete this user?")) {
                                fetch(`/api/users/${e.target.dataset.id}`, {method:'DELETE'})
                                    .then(() => loadUsers());
                            }
                        });
                    });
                });
        }

        form.addEventListener("submit", (e) => {
            e.preventDefault();
            const user = {
                username: form.username.value,
                passwordHash: form.passwordHash.value,
                role: form.role.value
            };
            fetch("/api/users", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(user)
            }).then(() => {
                form.reset();
                modal.hide();
                loadUsers();
            });
        });

        loadUsers();
    });
</script>
</body>
</html>

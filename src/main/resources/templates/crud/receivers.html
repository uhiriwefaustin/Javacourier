<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Manage Receivers')}"></head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>
<main class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-primary-custom"><i class="fa-solid fa-user-group me-2"></i> Manage Receivers</h2>
        <button class="btn btn-accent px-4 fw-bold" data-bs-toggle="modal" data-bs-target="#receiverModal">
            <i class="fa-solid fa-plus me-1"></i> New Receiver
        </button>
    </div>
    <div class="card card-custom border-0 p-3">
        <div class="table-responsive">
            <table class="table table-hover align-middle" id="receiversTable">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Phone</th>
                        <th>Email</th>
                        <th>Address</th>
                        <th class="text-end">Actions</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="receiverModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content border-0 card-custom">
                <div class="modal-header bg-primary-custom">
                    <h5 class="modal-title">Receiver Details</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="receiverForm">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Name</label>
                            <input type="text" class="form-control" id="name" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Phone</label>
                            <input type="text" class="form-control" id="phone" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Email</label>
                            <input type="email" class="form-control" id="email" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">Address</label>
                            <textarea class="form-control" id="address" rows="2" required></textarea>
                        </div>
                        <div class="text-end">
                            <button type="button" class="btn btn-outline-secondary me-2" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-accent px-4">Save</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const tableBody = document.querySelector("#receiversTable tbody");
        const form = document.getElementById("receiverForm");
        const modal = new bootstrap.Modal(document.getElementById('receiverModal'));

        function load() {
            fetch("/api/receivers").then(res => res.json()).then(data => {
                tableBody.innerHTML = "";
                data.forEach(r => {
                    const tr = document.createElement("tr");
                    tr.innerHTML = `
                        <td>${r.receiverId}</td>
                        <td class="fw-bold">${r.name}</td>
                        <td>${r.phone}</td>
                        <td>${r.email}</td>
                        <td>${r.address}</td>
                        <td class="text-end">
                            <button class="btn btn-sm btn-danger px-3 delete-btn" data-id="${r.receiverId}">Delete</button>
                        </td>
                    `;
                    tableBody.appendChild(tr);
                });
                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        if(confirm("Delete this receiver?")) {
                            fetch("/api/receivers/" + e.target.dataset.id, {method:'DELETE'}).then(() => load());
                        }
                    });
                });
            });
        }
        form.addEventListener("submit", (e) => {
            e.preventDefault();
            const data = { name: form.name.value, phone: form.phone.value, email: form.email.value, address: form.address.value };
            fetch("/api/receivers", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(data)
            }).then(() => { form.reset(); modal.hide(); load(); });
        });
        load();
    });
</script>
</body>
</html>

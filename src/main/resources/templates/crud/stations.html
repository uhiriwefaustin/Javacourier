<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Manage Stations')}"></head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>
<main class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-primary-custom"><i class="fa-solid fa-door-open me-2"></i> Manage Stations</h2>
        <button class="btn btn-accent px-4 fw-bold" data-bs-toggle="modal" data-bs-target="#stationModal">
            <i class="fa-solid fa-plus me-1"></i> New Station
        </button>
    </div>
    <div class="card card-custom border-0 p-3">
        <div class="table-responsive">
            <table class="table table-hover align-middle" id="stationsTable">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Station Name</th>
                        <th>City</th>
                        <th>Route</th>
                        <th class="text-end">Actions</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="stationModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content border-0 card-custom">
                <div class="modal-header bg-primary-custom">
                    <h5 class="modal-title">Station Details</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="stationForm">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Station Name</label>
                            <input type="text" class="form-control" id="stationName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">City</label>
                            <input type="text" class="form-control" id="city" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">Route ID</label>
                            <input type="number" class="form-control" id="routeId" required>
                        </div>
                        <div class="text-end">
                            <button type="button" class="btn btn-outline-secondary me-2" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-accent px-4">Save</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const tableBody = document.querySelector("#stationsTable tbody");
        const form = document.getElementById("stationForm");
        const modal = new bootstrap.Modal(document.getElementById('stationModal'));

        function load() {
            fetch("/api/stations").then(res => res.json()).then(data => {
                tableBody.innerHTML = "";
                data.forEach(s => {
                    const tr = document.createElement("tr");
                    tr.innerHTML = `
                        <td>${s.stationId}</td>
                        <td class="fw-bold">${s.stationName}</td>
                        <td>${s.city}</td>
                        <td>${s.route ? (s.route.departureCity + ' - ' + s.route.arrivalCity) : 'N/A'}</td>
                        <td class="text-end">
                            <button class="btn btn-sm btn-danger px-3 delete-btn" data-id="${s.stationId}">Delete</button>
                        </td>
                    `;
                    tableBody.appendChild(tr);
                });
                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        if(confirm("Delete this station?")) {
                            fetch("/api/stations/" + e.target.dataset.id, {method:'DELETE'}).then(() => load());
                        }
                    });
                });
            });
        }
        form.addEventListener("submit", (e) => {
            e.preventDefault();
            const data = { 
                stationName: form.stationName.value, 
                city: form.city.value, 
                route: { routeId: form.routeId.value } 
            };
            fetch("/api/stations", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(data)
            }).then(() => { form.reset(); modal.hide(); load(); });
        });
        load();
    });
</script>
</body>
</html>

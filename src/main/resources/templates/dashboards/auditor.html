<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Auditor Dashboard')}"></head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-primary-custom">Auditor Dashboard</h2>
        <span class="badge bg-info fs-6">AUDITOR ROLE</span>
    </div>

    <div class="row g-4 mb-5">
        <div class="col-md-4">
            <div class="card card-custom h-100 border-0">
                <div class="card-body text-center">
                    <i class="fa-solid fa-chart-pie fa-3x text-primary-custom mb-2"></i>
                    <h5 class="card-title">System Reports</h5>
                    <a href="#" class="btn btn-sm btn-outline-primary mt-2">View</a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card card-custom h-100 border-0">
                <div class="card-body text-center">
                    <i class="fa-solid fa-clipboard-check fa-3x text-primary-custom mb-2"></i>
                    <h5 class="card-title">Audit Logs Directory</h5>
                    <a href="#" class="btn btn-sm btn-outline-primary mt-2">View</a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card card-custom h-100 border-0">
                <div class="card-body text-center">
                    <i class="fa-solid fa-money-check-dollar fa-3x text-primary-custom mb-2"></i>
                    <h5 class="card-title">Payment Summaries</h5>
                    <a href="#" class="btn btn-sm btn-outline-primary mt-2">View</a>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>

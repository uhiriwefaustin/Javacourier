<!DOCTYPE html>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="container py-5">

                    <a href="#" class="btn btn-sm btn-outline-primary mt-2">View</a>

        </div>
        <div class="col-md-3">
            <div class="card card-custom h-100 border-0">

                    <a href="#" class="btn btn-sm btn-outline-primary mt-2">View</a>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card card-custom h-100 border-0">
                <div class="card-body text-center">
                    <i class="fa-solid fa-money-bill-wave fa-3x text-primary-custom mb-2"></i>
                    <h5 class="card-title">Process Payments</h5>
                    <a href="#" class="btn btn-sm btn-outline-primary mt-2">View</a>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Driver Dashboard')}"></head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-primary-custom">Driver Dashboard</h2>
        <span class="badge bg-success fs-6">DRIVER ROLE</span>
    </div>

    <div class="row g-4 mb-5">
        <div class="col-md-4">
            <div class="card card-custom h-100 border-0">
                <div class="card-body text-center">
                    <i class="fa-solid fa-boxes-stacked fa-3x text-primary-custom mb-2"></i>
                    <h5 class="card-title">Assigned Packages</h5>
                    <a href="#" class="btn btn-sm btn-outline-primary mt-2">View</a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card card-custom h-100 border-0">
                <div class="card-body text-center">
                    <i class="fa-solid fa-location-crosshairs fa-3x text-primary-custom mb-2"></i>
                    <h5 class="card-title">Update Tracking</h5>
                    <a href="#" class="btn btn-sm btn-outline-primary mt-2">View</a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card card-custom h-100 border-0">
                <div class="card-body text-center">
                    <i class="fa-solid fa-map-location fa-3x text-primary-custom mb-2"></i>
                    <h5 class="card-title">View Stations</h5>
                    <a href="#" class="btn btn-sm btn-outline-primary mt-2">View</a>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
